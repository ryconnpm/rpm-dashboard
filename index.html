<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>RPM Dashboard Archive</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F4F3F0;--surface:#fff;--border:#E2DFD8;--text:#1A1917;--text2:#6B6963;--text3:#9E9A93;--dark:#1F3D87;--mid:#21569B;--accent:#E8EEF8;--success:#0F6E56;--success-bg:#E1F5EE}html,body{height:100%;overflow:hidden}body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}.host-bar{background:var(--dark);height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:10}.ctrl-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;text-decoration:none;font-family:"DM Sans",sans-serif;transition:background .15s}.ctrl-btn:hover{background:rgba(255,255,255,0.28)}.ctrl-icon{font-size:14px;transition:transform .2s}.host-center{font-size:11px;color:rgba(255,255,255,0.55);font-family:"DM Mono",monospace}.layout{display:flex;flex:1;overflow:hidden}.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .2s ease,opacity .15s ease}.sidebar.collapsed{width:0;opacity:0;pointer-events:none}.sidebar-title{padding:12px 14px 8px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}.sidebar-links{overflow-y:auto;flex:1;padding:6px 0}.day-link{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;font-size:12px;font-weight:500;color:var(--text2);text-decoration:none;cursor:pointer;border-left:3px solid transparent;transition:all .15s;white-space:nowrap}.day-link:hover{background:var(--accent);color:var(--dark)}.day-link.active{background:var(--accent);color:var(--dark);border-left-color:var(--mid);font-weight:600}.day-link.latest{color:var(--dark)}.badge{font-size:9px;font-weight:700;background:var(--success-bg);color:var(--success);padding:2px 5px;border-radius:99px;white-space:nowrap}.main{flex:1;overflow:hidden;display:flex;flex-direction:column}.day-card{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100%}.dash-frame{flex:1;width:100%;border:none;background:#fff}.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px}</style></head><body><div class="host-bar"><button class="ctrl-btn" onclick="toggleSidebar()" id="toggleBtn"><span class="ctrl-icon" id="toggleIcon">&#9776;</span> Reports</button><span class="host-center" id="dateLabel">May 3, 2026</span><a class="ctrl-btn" id="openFullBtn" href="2026-05-03.html" target="_blank">Open Full Page &#8599;</a></div><div class="layout"><div class="sidebar collapsed" id="sidebar"><div class="sidebar-title">Reports</div><div class="sidebar-links"><a href="2026-05-03.html" class="day-link latest" onclick="loadDay(event,'2026-05-03.html')"><span class="day-label">May 3, 2026</span><span class="badge">Latest</span></a><a href="2026-05-02.html" class="day-link" onclick="loadDay(event,'2026-05-02.html')"><span class="day-label">May 2, 2026</span></a><a href="2026-05-01.html" class="day-link" onclick="loadDay(event,'2026-05-01.html')"><span class="day-label">May 1, 2026</span></a><a href="2026-04-30.html" class="day-link" onclick="loadDay(event,'2026-04-30.html')"><span class="day-label">Apr 30, 2026</span></a><a href="2026-04-29.html" class="day-link" onclick="loadDay(event,'2026-04-29.html')"><span class="day-label">Apr 29, 2026</span></a><a href="2026-04-28.html" class=
