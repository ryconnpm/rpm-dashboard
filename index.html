st Recent</span></div><a href="2026-04-23.html" target="_blank" class="open-btn">Open Full Page ↗</a></div><iframe src="2026-04-23.html" class="dash-frame" loading="lazy"></iframe></div></div></div><script>function loadDay(e, filename) {  e.preventDefault();  var id = filename.replace(".html","");  document.querySelectorAll(".day-card").forEach(function(c){c.style.display="none"});  document.querySelectorAll(".day-link").forEach(function(l){l.classList.remove("active")});  var card = document.getElementById("card-"+id);  if(card) card.style.display="flex";  e.currentTarget.classList.add("active");}document.addEventListener("DOMContentLoaded",function(){  var first = document.querySelector(".day-link");  if(first) first.classList.add("active");});</script></body></html>
